<style>

:root{--black:#0A0A0A;--black-2:#111111;--black-3:#1A1A1A;--gold:#C9A96E;--gold-light:#E8D5B0;--gold-dark:#9A7A47;--ivory:#F5F0E8;--ivory-muted:#BDB5A6}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--ivory);font-family:'Montserrat',sans-serif;font-weight:300;line-height:1.7;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gold-dark)}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 4vw;height:80px;background:rgba(10,10,10,0.95);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,169,110,0.1)}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.nav-logo img{height:46px;width:auto;display:block}
.nav-links{display:flex;gap:1.4rem;list-style:none}
.nav-links a{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ivory-muted);text-decoration:none;font-weight:400;transition:color .2s;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-cta{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;font-weight:500;color:var(--black);background:var(--gold);border:none;padding:.6rem 1.2rem;cursor:pointer;text-decoration:none;transition:background .2s;font-family:'Montserrat',sans-serif;white-space:nowrap}
.nav-cta:hover{background:var(--gold-light)}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.burger span{display:block;width:22px;height:1px;background:var(--ivory)}
.mobile-menu{display:none;position:fixed;inset:0;background:var(--black);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--ivory);text-decoration:none;font-weight:300}
.mobile-menu a:hover{color:var(--gold)}
.mobile-close{position:absolute;top:2rem;right:4vw;background:none;border:none;color:var(--ivory);font-size:1.8rem;cursor:pointer;font-family:'Cormorant Garamond',serif}
@media(max-width:900px){.nav-links,.nav-cta{display:none}.burger{display:flex}}
/* HERO */
.hero-seo{min-height:60vh;display:flex;align-items:flex-end;position:relative;overflow:hidden;padding-top:80px}
.hero-bg{position:absolute;inset:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--black) 0%,rgba(10,10,10,.5) 50%,transparent 100%)}
.hero-content{position:relative;z-index:2;padding:0 4vw 5rem;max-width:820px}
.eyebrow{font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);font-weight:500;display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--gold)}
.hero-content h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,4.5rem);font-weight:300;line-height:1.1;margin-bottom:1.2rem}
.hero-content h1 em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:.88rem;color:rgba(245,240,232,.75);line-height:1.85;max-width:600px;font-weight:300}
/* BREADCRUMB */
.breadcrumb{background:var(--black-2);padding:.8rem 4vw;border-bottom:1px solid rgba(201,169,110,0.07)}
.breadcrumb-inner{font-size:.65rem;color:var(--ivory-muted);font-weight:300;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.breadcrumb-inner a{color:var(--ivory-muted);text-decoration:none;transition:color .2s}
.breadcrumb-inner a:hover{color:var(--gold)}
.breadcrumb-inner span{color:rgba(189,181,166,.4)}
/* CONTENT */
.content-section{padding:5rem 4vw}
.content-section.alt{background:var(--black-2)}
.content-inner{max-width:860px;margin:0 auto}
.content-inner h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3vw,2.8rem);font-weight:300;color:var(--ivory);margin-bottom:1.2rem;line-height:1.2}
.content-inner h2 em{font-style:italic;color:var(--gold)}
.content-inner h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;color:var(--ivory);margin:2rem 0 .8rem}
.content-inner p{font-size:.85rem;color:var(--ivory-muted);line-height:1.9;margin-bottom:1.2rem;font-weight:300}
.content-inner p strong{color:var(--ivory);font-weight:500}
.content-inner ul{margin:.8rem 0 1.2rem 1.2rem;display:flex;flex-direction:column;gap:.4rem}
.content-inner ul li{font-size:.83rem;color:var(--ivory-muted);line-height:1.75;font-weight:300}
.content-inner ul li::marker{color:var(--gold)}
/* PROOF BAND */
.proof-band{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(201,169,110,0.07)}
.proof-item{background:var(--black-2);padding:2rem 1.5rem;text-align:center}
.proof-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--gold);line-height:1;margin-bottom:.4rem}
.proof-lbl{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ivory-muted);font-weight:400}
/* PROCESS */
.process-grid{display:flex;flex-direction:column;gap:0;margin-top:2.5rem}
.p-step{display:grid;grid-template-columns:60px 1fr;gap:1.5rem;padding-bottom:2.5rem;position:relative}
.p-step:not(:last-child)::before{content:'';position:absolute;left:29px;top:60px;bottom:0;width:1px;background:linear-gradient(to bottom,rgba(201,169,110,0.25),transparent)}
.p-num{width:60px;height:60px;border:1px solid rgba(201,169,110,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);flex-shrink:0;transition:background .3s}
.p-step:hover .p-num{background:var(--gold);color:var(--black)}
.p-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--ivory);margin-bottom:.4rem;margin-top:.6rem}
.p-text{font-size:.8rem;color:var(--ivory-muted);line-height:1.8;font-weight:300}
/* FAQ */
.faq-item{border-bottom:1px solid rgba(201,169,110,0.08)}
.faq-item:first-child{border-top:1px solid rgba(201,169,110,0.08)}
.faq-q{width:100%;background:none;border:none;padding:1.3rem 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;text-align:left;gap:2rem}
.faq-q-text{font-size:.85rem;color:var(--ivory);font-weight:400;font-family:'Montserrat',sans-serif;line-height:1.5;flex:1}
.faq-q:hover .faq-q-text{color:var(--gold)}
.faq-icon{width:22px;height:22px;border:1px solid rgba(201,169,110,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold);font-size:.9rem;transition:background .2s}
.faq-item.open .faq-icon{background:var(--gold);color:var(--black)}
.faq-a{display:none;padding:0 0 1.3rem}
.faq-item.open .faq-a{display:block}
.faq-a p{font-size:.82rem;color:var(--ivory-muted);line-height:1.85;font-weight:300}
/* RELATED LINKS */
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(201,169,110,0.07)}
.related-card{background:var(--black-2);padding:2rem 1.5rem;text-decoration:none;transition:background .3s;display:block;position:relative;overflow:hidden}
.related-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width .4s}
.related-card:hover{background:var(--black-3)}
.related-card:hover::after{width:100%}
.related-card-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:.6rem}
.related-card-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ivory);margin-bottom:.5rem}
.related-card-desc{font-size:.75rem;color:var(--ivory-muted);line-height:1.7;font-weight:300}
.related-card-arrow{font-size:.7rem;color:var(--gold);margin-top:.8rem;display:block}
/* CTA */
.cta-section{background:var(--gold);padding:5rem 4vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:2rem}
.cta-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,3vw,2.5rem);font-weight:300;color:var(--black);line-height:1.3}
.cta-text em{font-style:italic}
.cta-actions{display:flex;gap:1rem;flex-wrap:wrap}
.btn-dark{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;font-weight:500;color:var(--ivory);background:var(--black);border:none;padding:1rem 2rem;cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s;font-family:'Montserrat',sans-serif}
.btn-dark:hover{background:var(--black-3)}
.btn-gold{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;font-weight:500;color:var(--black);background:transparent;border:2px solid var(--black);padding:1rem 2rem;cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s;font-family:'Montserrat',sans-serif}
.btn-gold:hover{background:var(--black);color:var(--ivory)}
/* FOOTER */






/* HIGHLIGHT BOX */
.highlight-box{background:rgba(201,169,110,0.06);border-left:3px solid var(--gold);padding:1.5rem 2rem;margin:1.5rem 0}
.highlight-box p{font-size:.83rem;color:var(--ivory);line-height:1.8;font-weight:300;margin:0}
.highlight-box p strong{color:var(--gold)}
/* RESPONSIVE */
@media(max-width:900px){.proof-band{grid-template-columns:1fr 1fr}.related-grid{grid-template-columns:1fr}.cta-section{flex-direction:column}}
@media(max-width:600px){.proof-band{grid-template-columns:1fr 1fr}}


/* ─── BARRE STICKY MOBILE ─── */
.sticky-mobile{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--black);border-top:1px solid rgba(201,169,110,0.15);padding:.8rem 1rem;gap:.6rem}
@media(max-width:900px){.sticky-mobile{display:flex}}
.sticky-btn{flex:1;padding:.75rem .5rem;text-align:center;text-decoration:none;font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:opacity .2s}
.sticky-btn:hover{opacity:.85}
.sticky-btn-icon{font-size:1rem;line-height:1}
.sticky-btn-label{font-size:.52rem;letter-spacing:.08em}
.sticky-btn.call{background:var(--gold);color:var(--black)}
.sticky-btn.whatsapp{background:#25D366;color:#fff}
.sticky-btn.devis{background:var(--black-3);color:var(--gold);border:1px solid rgba(201,169,110,0.25)}


/* ─── WHATSAPP FLOTTANT ─── */
.wa-float{position:fixed;bottom:90px;right:24px;z-index:199;width:52px;height:52px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);text-decoration:none;transition:transform .2s,box-shadow .2s}
.wa-float:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,0.55)}
.wa-float svg{width:26px;height:26px;fill:#fff}
@media(max-width:900px){.wa-float{bottom:80px;right:16px;width:46px;height:46px}}












/* ═══ FOOTER TGD (centré) ═══ */
footer.footer-mini{background:var(--black-2);border-top:1px solid rgba(201,169,110,0.06);padding:2.5rem 4vw;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1.4rem;text-align:center}
footer.footer-mini a.footer-logo{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ivory);text-decoration:none}
footer.footer-mini ul.footer-links-list{display:flex;flex-direction:row;justify-content:center;gap:2rem;list-style:none;flex-wrap:wrap;margin:0;padding:0}
footer.footer-mini ul.footer-links-list li{margin:0;padding:0;list-style:none}
footer.footer-mini ul.footer-links-list a{font-size:.62rem;color:rgba(189,181,166,0.45);text-decoration:none;font-weight:300;transition:color .2s}
footer.footer-mini ul.footer-links-list a:hover{color:var(--ivory-muted)}
footer.footer-mini span.footer-copy{font-size:.6rem;color:rgba(189,181,166,0.3);font-weight:300}

/* lisibilité menu haut */
.nav-links a{font-size:.7rem !important;letter-spacing:.12em;transition:color .2s}
.nav-links a:hover{color:var(--gold) !important}
.nav-cta{font-size:.7rem !important}
/* lisibilité menu bas */
footer.footer-mini ul.footer-links-list a{color:rgba(189,181,166,0.72) !important}
footer.footer-mini ul.footer-links-list a:hover{color:var(--ivory) !important}
footer.footer-mini span.footer-copy{color:rgba(189,181,166,0.55) !important}

/* rythme espacements validé */
.hero{min-height:88vh !important;height:auto !important}
section{padding:4.5rem 4vw !important}
.cta-section{padding:5rem 4vw !important}
.adn{gap:4rem !important}
.coverage-inner{gap:4rem !important}
.cta-section{gap:4rem !important}
.founder{padding:4.5rem 4vw !important}


</style>
